<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Producto - Dormilin</title>
    <!-- CSS Bootstrap y FontAwesome -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/6fca39497a.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- Botón Flotante del Carrito -->
    <button class="btn btn-warning position-fixed bottom-0 end-0 m-4 rounded-circle shadow-lg z-3 p-3" 
            data-bs-toggle="modal" 
            data-bs-target="#cartModal"
            aria-label="Ver carrito">
        <i class="fa-solid fa-cart-shopping fs-4"></i>
        <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
    </button>

    <div class="container my-5">
        <!-- Botón para volver al catálogo -->
        <a href="index.html" class="btn btn-outline-secondary mb-4">
            <i class="fa-solid fa-arrow-left me-2"></i>Volver al catálogo
        </a>

        <!-- Vista del Producto (Se llena con JS) -->
        <div id="productDetailContainer" class="row g-4 align-items-center">
            <!-- Cargando... -->
        </div>
    </div>

    <!-- Modal del Carrito (Mismo que en index.html) -->
    <div class="modal fade" id="cartModal" tabindex="-1" aria-labelledby="cartModalLabel">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="cartModalLabel"><i class="fa-solid fa-cart-shopping me-2"></i>Tu Carrito</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <ul id="cartItemsList" class="list-group mb-3"></ul>
                    <div class="d-flex justify-content-between align-items-center fw-bold fs-5 border-top pt-3">
                        <span>Total:</span>
                        <span id="cartTotal" class="text-primary">$0</span>
                    </div>
                </div>
                <div class="modal-footer d-flex justify-content-between">
                    <button type="button" class="btn btn-outline-danger btn-sm" id="emptyCartBtn">Vaciar Carrito</button>
                    <a id="sendWhatsappBtn" href="#" target="_blank" class="btn btn-success disabled">
                        <i class="fa-brands fa-whatsapp me-2"></i>Confirmar Pedido
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./products.js"></script>
</body>
</html>
