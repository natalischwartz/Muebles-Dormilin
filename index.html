<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./logo-dormilin.jpg" type="image/x-icon">

     <script src="https://kit.fontawesome.com/6fca39497a.js" crossorigin="anonymous"></script>

    <title>Muebles Dormilin</title>

    <!-- CSS Bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="home-page">

    <!-- Botón Flotante para Ver Carrito -->
    <button class="btn btn-warning position-fixed bottom-0 end-0 m-4 rounded-circle shadow-lg z-3 p-3" 
            data-bs-toggle="modal" 
            data-bs-target="#cartModal"
            aria-label="Ver carrito de compras">
        <i class="fa-solid fa-cart-shopping fs-4"></i>
        <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
            0
        </span>
    </button>
    
    <main>
       <section class="hero-header">
        <!-- Contenedor del contenido (se mantiene 100% opaco) -->
        <div class="hero-content text-center text-white p-5">
            <div class="mb-4">
                <span class="fw-bold fs-1 text-white" style="letter-spacing: 6px;">DORMILIN</span><br>
                <span class="fs-6 text-light" style="letter-spacing: 3px;">MUEBLES Y COLCHONES</span>
            </div>
                <h1>Nuestras Ofertas</h1>
                <p>Descubre los mejores muebles para tu hogar.</p>
                <!-- <button class="btn btn-primary btn-lg mt-3">Ver Catálogo</button> -->
                 
            </div>
        </section>
        
        <section class="products">
            <div class="text-catalogo">
                <p class="fw-bold fs-1 text-white" style="letter-spacing: 6px;">CATALOGO</p>
            </div>
            
            <div class="container my-5">
                <div id="productsUL" class="row">
                <!-- Las tarjetas de JavaScript se inyectarán aquí dentro -->
                </div>
            </div>
        </section>
    </main>

    <!-- Modal del Carrito de Compras -->
    <div class="modal fade" id="cartModal" tabindex="-1" aria-labelledby="cartModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="cartModalLabel"><i class="fa-solid fa-cart-shopping me-2"></i>Tu Carrito</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- Lista donde se renderizan los productos del carrito -->
                    <ul id="cartItemsList" class="list-group mb-3">
                        <!-- Se llena con JS -->
                    </ul>
                    
                    <div class="d-flex justify-content-between align-items-center fw-bold fs-5 border-top pt-3">
                        <span>Total:</span>
                        <span id="cartTotal" class="text-primary">$0</span>
                    </div>
                </div>
                <div class="modal-footer d-flex justify-content-between">
                    <button type="button" class="btn btn-outline-danger btn-sm" id="emptyCartBtn">Vaciar Carrito</button>
                    <a id="sendWhatsappBtn" href="#" target="_blank" class="btn btn-success disabled">
                        <i class="fa-brands fa-whatsapp me-2"></i>Confirmar Pedido
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <section>
            <div class="logo-dormilin">
                <img src="./logo-dormilin.jpg" alt="">

            </div>
            <div class="contact-info">
                <i class="fa-solid fa-phone text-2xl sm:text-3xl"></i>+ 54 9 1132778004
                 <i class="fa-solid fa-envelope text-2xl text-emerald-700 sm:text-3xl"></i>info@formilin.com
                 <i class="fa-solid fa-location-dot"></i>9 de julio 178, Moron

            </div>
            <div class="social-media">
                <ul class="social-media_redes">
                    <li>
                        <a href="https://www.instagram.com/mueblesdormilin/" class="cursor-pointer" target="_blank">
                            <i class="fa-brands fa-instagram text-2xl sm:text-3xl">
                            </i>
                        </a>
                    </li>
                    <li>
                        <a href="https://www.facebook.com/profile.php?id=61561301969841" class="cursor-pointer" target="_blank">
                            <i class="fa-brands fa-facebook text-2xl sm:text-3xl">
                            </i>
                        </a>
                    </li>
                    <li>
                        <a href="https://wa.me/5491132778004" target="_blank" class="cursor-pointer">
                            <i class="fa-brands fa-whatsapp text-2xl sm:text-3xl"></i>
                        </a>
                    </li>
                </ul>
            </div>
        </section>
        <div class="copyright">
            Todos los derechos reservados &copy
        </div>
        <div class="developed-by">
            <p className="text-xs">
            Desarrollado por
            <a 
              href="https://portfolio-natali-schwartz.vercel.app/" 
              target="_blank" 
              rel="noopener noreferrer"
              className="font-semibold hover:text-blue-800 transition-colors underline-offset-4 hover:underline"
            >
              Natali Schwartz
            </a>
            </p>

        </div>
         
       
    </footer>
    <!--JS de Bootstrap-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./script.js"></script>
</body>
</html>
